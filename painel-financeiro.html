<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Financeiro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --paper:#F6F1E4;
  --paper-card:#FFFDF7;
  --ink:#1E2B22;
  --ink-soft:#5B6459;
  --green:#2F5233;
  --green-deep:#1B3A2F;
  --gold:#A9782F;
  --gold-light:#E8D9B8;
  --red:#A13D2B;
  --red-bg:#F6E7E1;
  --green-bg:#E7EFE3;
  --line:#D8CFB8;
  --line-strong:#B9AD8C;
}

body.theme-michelle{
  --paper:#F7EFEC;
  --paper-card:#FFFBFA;
  --ink:#3A2C2E;
  --ink-soft:#7A6266;
  --green:#B06A82;
  --green-deep:#7A3F55;
  --gold:#C98A98;
  --gold-light:#F0DEDF;
  --red:#8B4A4A;
  --red-bg:#F3E4E0;
  --green-bg:#F3E6EA;
  --line:#E8D6D3;
  --line-strong:#CBA9AE;
}

body.theme-michelle .masthead-title::after{content:' ❀';color:var(--gold);font-size:0.6em;vertical-align:middle;}
body.theme-michelle .stamp{color:var(--gold);border-color:var(--gold);}
body.theme-michelle .debt-progress-bar{background:var(--gold);}

body.theme-gabriel{
  --paper:#F1F1EF;
  --paper-card:#FFFFFF;
  --ink:#111111;
  --ink-soft:#5C5C5C;
  --green:#2B2B2B;
  --green-deep:#000000;
  --gold:#4A4A4A;
  --gold-light:#E2E2E2;
  --red:#7A2020;
  --red-bg:#EDE7E7;
  --green-bg:#E7E7E5;
  --line:#D6D6D2;
  --line-strong:#A8A8A2;
}

*{box-sizing:border-box;}

body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  padding:32px 16px 80px;
  min-height:100vh;
}

.wrap{max-width:1040px;margin:0 auto;}

.tabs{
  display:flex;
  gap:6px;
  margin-bottom:18px;
}

.tab-btn{
  font-family:'Fraunces',serif;
  font-size:15px;
  font-weight:500;
  padding:9px 22px;
  border:1px solid var(--line-strong);
  border-bottom:none;
  background:var(--line);
  color:var(--ink-soft);
  border-radius:6px 6px 0 0;
  cursor:pointer;
  position:relative;
  top:1px;
}

.tab-btn.active{
  background:var(--paper-card);
  color:var(--green-deep);
  border-color:var(--green-deep);
  border-bottom:1px solid var(--paper-card);
}

.masthead{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  flex-wrap:wrap;
  gap:16px;
  border-bottom:2px solid var(--green-deep);
  padding-bottom:18px;
  margin-bottom:8px;
}

.masthead-title{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:34px;
  color:var(--green-deep);
  letter-spacing:-0.01em;
  margin:0;
}

.masthead-sub{
  font-size:13px;
  color:var(--ink-soft);
  margin-top:4px;
  font-style:italic;
}

.month-nav{
  display:flex;
  align-items:center;
  gap:10px;
}

.month-arrow{
  font-family:'Fraunces',serif;
  font-size:16px;
  line-height:1;
  color:var(--green-deep);
  background:transparent;
  border:1px solid var(--line-strong);
  border-radius:50%;
  width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  padding:0;
}
.month-arrow:hover{background:var(--gold-light);border-color:var(--gold);}

.month-label{
  font-family:'Fraunces',serif;
  font-size:16px;
  color:var(--green-deep);
  min-width:150px;
  text-align:center;
}

.hero{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:24px;
  padding:28px 8px 24px;
  border-bottom:1px solid var(--line);
  margin-bottom:32px;
}

.hero-label{
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:var(--ink-soft);
  margin:0 0 6px;
}

.hero-value{
  font-family:'IBM Plex Mono',monospace;
  font-size:44px;
  font-weight:600;
  margin:0;
  line-height:1;
}
.hero-value.pos{color:var(--green-deep);}
.hero-value.neg{color:var(--red);}

.hero-stats{
  display:flex;
  gap:28px;
  flex-wrap:wrap;
}

.stat-block{text-align:right;}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink-soft);margin:0 0 4px;}
.stat-value{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:500;margin:0;}
.stat-value.income{color:var(--green-deep);}
.stat-value.expense{color:var(--red);}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:28px;
  margin-bottom:28px;
}
@media(max-width:760px){.grid{grid-template-columns:1fr;}}

.card{
  background:var(--paper-card);
  border:1px solid var(--line);
  border-radius:2px;
  padding:20px 22px 22px;
  position:relative;
}

.card-title{
  font-family:'Fraunces',serif;
  font-size:19px;
  font-weight:600;
  color:var(--green-deep);
  margin:0 0 2px;
  display:flex;
  align-items:baseline;
  justify-content:space-between;
}

.card-count{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  color:var(--ink-soft);
  font-weight:400;
}

.rule{
  border:none;
  border-top:1px solid var(--line);
  margin:12px 0 14px;
}

.row-list{list-style:none;margin:0;padding:0;}

.row-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:9px 0;
  border-bottom:1px dotted var(--line);
}
.row-item:last-child{border-bottom:none;}

.row-check{
  width:18px;height:18px;
  border:1.5px solid var(--line-strong);
  border-radius:3px;
  cursor:pointer;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--paper-card);
}
.row-check.checked{background:var(--green-deep);border-color:var(--green-deep);}
.row-check svg{width:11px;height:11px;stroke:var(--paper-card);display:none;}
.row-check.checked svg{display:block;}

.row-name{flex:1;font-size:14px;min-width:0;}
.row-name.paid{color:var(--ink-soft);text-decoration:line-through;text-decoration-color:var(--line-strong);}
.row-day{font-size:11px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;white-space:nowrap;}

.row-value{
  font-family:'IBM Plex Mono',monospace;
  font-size:14px;
  font-weight:500;
  white-space:nowrap;
  min-width:76px;
  text-align:right;
}
.row-value.income{color:var(--green-deep);}
.row-value.expense{color:var(--red);}

.row-value-edit{
  font-family:'IBM Plex Mono',monospace;
  font-size:14px;
  font-weight:500;
  white-space:nowrap;
  min-width:76px;
  max-width:90px;
  text-align:right;
  border:1px solid transparent;
  border-bottom:1px dashed var(--line-strong);
  background:transparent;
  color:var(--red);
  padding:0 2px;
  outline:none;
}
.row-value-edit:focus{border-color:var(--gold);border-radius:2px;}

.row-item.row-carry{background:var(--red-bg);margin:0 -8px;padding:9px 8px;border-radius:2px;}

.carry-tag{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:0.04em;
  color:var(--red);
  border:1px solid var(--red);
  border-radius:3px;
  padding:1px 5px;
  margin-left:6px;
}

.row-del{
  background:none;border:none;cursor:pointer;
  color:var(--line-strong);
  font-size:16px;
  padding:0 2px;
  line-height:1;
  flex-shrink:0;
}
.row-del:hover{color:var(--red);}

.empty-msg{
  font-size:13px;
  color:var(--ink-soft);
  font-style:italic;
  padding:10px 0;
}

.add-form{
  display:flex;
  gap:8px;
  margin-top:14px;
  flex-wrap:wrap;
}
.add-form input{
  font-family:'Inter',sans-serif;
  font-size:13px;
  padding:8px 10px;
  border:1px solid var(--line);
  border-radius:2px;
  background:#fff;
  color:var(--ink);
  outline:none;
}
.add-form input:focus{border-color:var(--gold);}
.add-form .f-name{flex:2;min-width:110px;}
.add-form .f-value{flex:1;min-width:80px;}
.add-form .f-day{width:56px;}
.add-btn{
  font-family:'Inter',sans-serif;
  font-size:13px;
  font-weight:500;
  padding:8px 14px;
  border:1px solid var(--green-deep);
  background:var(--green-deep);
  color:var(--paper-card);
  border-radius:2px;
  cursor:pointer;
}
.add-btn:hover{background:var(--green);}

.subtotal-row{
  display:flex;
  justify-content:space-between;
  padding-top:10px;
  margin-top:4px;
  border-top:1px solid var(--line-strong);
  font-family:'IBM Plex Mono',monospace;
  font-size:13px;
  font-weight:600;
}

.debts-card{background:var(--paper-card);border:1px solid var(--line);border-radius:2px;padding:20px 22px 22px;margin-bottom:28px;}

.debt-item{
  display:flex;
  align-items:center;
  gap:14px;
  padding:12px 0;
  border-bottom:1px dotted var(--line);
  flex-wrap:wrap;
}
.debt-item:last-child{border-bottom:none;}

.debt-main{flex:1;min-width:160px;}
.debt-name{font-size:14px;font-weight:500;margin:0 0 4px;}
.debt-name.paid{color:var(--ink-soft);text-decoration:line-through;text-decoration-color:var(--line-strong);}
.debt-progress-wrap{
  height:5px;background:var(--line);border-radius:3px;overflow:hidden;width:100%;max-width:220px;
}
.debt-progress-bar{height:100%;background:var(--gold);}
.debt-meta{font-size:11px;color:var(--ink-soft);margin-top:4px;font-family:'IBM Plex Mono',monospace;}

.stamp{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  font-weight:600;
  color:var(--gold);
  border:1.5px solid var(--gold);
  border-radius:3px;
  padding:2px 6px;
  letter-spacing:0.05em;
  transform:rotate(-6deg);
  display:inline-block;
}

.close-month-box{
  background:var(--green-bg);
  border:1px solid var(--line);
  border-radius:2px;
  padding:16px 20px;
  margin-top:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
}

.close-month-text{max-width:560px;}
.close-month-text p{margin:0 0 4px;font-size:13px;color:var(--ink-soft);line-height:1.5;}
.close-month-text strong{color:var(--green-deep);}

.close-month-btn{
  font-family:'Inter',sans-serif;
  font-size:13px;
  font-weight:500;
  padding:11px 20px;
  border:1px solid var(--gold);
  background:var(--gold-light);
  color:#5B4419;
  border-radius:2px;
  cursor:pointer;
  white-space:nowrap;
}
.close-month-btn:hover{background:var(--gold);color:#fff;}

.toast{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--green-deep);
  color:var(--paper-card);
  font-family:'Inter',sans-serif;
  font-size:13px;
  padding:12px 20px;
  border-radius:4px;
  opacity:0;
  transition:opacity 0.25s, transform 0.25s;
  pointer-events:none;
  max-width:90%;
  text-align:center;
  z-index:10;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.footer-actions{
  display:flex;
  justify-content:flex-end;
  align-items:center;
  flex-wrap:wrap;
  gap:12px;
  margin-top:4px;
}

.saved-tag{
  font-size:11px;
  color:var(--ink-soft);
  font-style:italic;
  opacity:0;
  transition:opacity 0.3s;
}
.saved-tag.show{opacity:1;}

.loading{
  text-align:center;
  padding:60px 20px;
  color:var(--ink-soft);
  font-family:'Fraunces',serif;
  font-style:italic;
}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">Abrindo o livro-razão…</div>
</div>
<div class="toast" id="toast"></div>

<script>
const USERS = [
  {id:'michelle', label:'Michelle'},
  {id:'gabriel', label:'Gabriel'}
];
const ACTIVE_USER_KEY = 'painel-financeiro-active-user';

function storageKey(userId){ return 'painel-financeiro-v1-' + userId; }

let activeUser = 'michelle';

let dataByUser = {};
function emptyData(){
  return { month:currentMonthStr(), incomes:[], fixed:[], debts:[] };
}

function uid(){ return Math.random().toString(36).slice(2,9); }

function currentMonthStr(){
  const now = new Date();
  return now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
}

function shiftMonth(monthStr, delta){
  let y, m;
  if(monthStr && /^\d{4}-\d{2}$/.test(monthStr)){
    [y, m] = monthStr.split('-').map(Number);
  }else{
    const now = new Date();
    y = now.getFullYear(); m = now.getMonth()+1;
  }
  m += delta;
  while(m < 1){ m += 12; y--; }
  while(m > 12){ m -= 12; y++; }
  return y + '-' + String(m).padStart(2,'0');
}

function monthLabel(monthStr){
  if(!monthStr || !/^\d{4}-\d{2}$/.test(monthStr)) monthStr = currentMonthStr();
  const [y, m] = monthStr.split('-').map(Number);
  const label = new Date(y, m-1, 1).toLocaleDateString('pt-BR', {month:'long', year:'numeric'});
  return label.charAt(0).toUpperCase() + label.slice(1);
}

function fmt(v){
  return v.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
}

function currentData(){
  if(!dataByUser[activeUser]) dataByUser[activeUser] = emptyData();
  return dataByUser[activeUser];
}

function loadActiveUser(){
  try{
    const v = localStorage.getItem(ACTIVE_USER_KEY);
    if(v && USERS.some(u=>u.id===v)) activeUser = v;
  }catch(e){}
}

function loadUserData(userId){
  try{
    const v = localStorage.getItem(storageKey(userId));
    if(v){
      dataByUser[userId] = Object.assign(emptyData(), JSON.parse(v));
      return;
    }
  }catch(e){}
  dataByUser[userId] = emptyData();
}

let saveTimer = null;
function saveData(){
  try{
    localStorage.setItem(storageKey(activeUser), JSON.stringify(currentData()));
    localStorage.setItem(ACTIVE_USER_KEY, activeUser);
    const tag = document.getElementById('saved-tag');
    if(tag){
      tag.classList.add('show');
      clearTimeout(saveTimer);
      saveTimer = setTimeout(()=>tag.classList.remove('show'), 1200);
    }
  }catch(e){
    console.error('Erro ao salvar:', e);
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3800);
}

function totalIncome(){ return currentData().incomes.reduce((s,i)=>s+Number(i.value||0),0); }
function totalFixed(){ return currentData().fixed.reduce((s,i)=>s+Number(i.value||0),0); }
function activeDebts(){ return currentData().debts.filter(d=>d.paidInstallments < d.totalInstallments); }
function totalDebts(){ return activeDebts().reduce((s,d)=>s+Number(d.installment||0),0); }
function totalPending(){
  const fixedPending = currentData().fixed.filter(f=>!f.paid).reduce((s,i)=>s+Number(i.value||0),0);
  const debtPending = activeDebts().filter(d=>!d.paid).reduce((s,i)=>s+Number(i.installment||0),0);
  return fixedPending + debtPending;
}

function switchUser(userId){
  if(userId === activeUser) return;
  activeUser = userId;
  if(!dataByUser[userId]) loadUserData(userId);
  try{ localStorage.setItem(ACTIVE_USER_KEY, activeUser); }catch(e){}
  render();
}

function render(){
  document.body.classList.toggle('theme-michelle', activeUser === 'michelle');
  document.body.classList.toggle('theme-gabriel', activeUser === 'gabriel');
  const app = document.getElementById('app');
  const data = currentData();
  const income = totalIncome();
  const fixed = totalFixed();
  const debts = totalDebts();
  const committed = fixed + debts;
  const saldo = income - committed;
  const pending = totalPending();
  const fixedPaidCount = data.fixed.filter(f=>f.paid).length;
  const debtPaidCount = activeDebts().filter(d=>d.paid).length;

  app.innerHTML = `
    <div class="tabs">
      ${USERS.map(u=>`<button class="tab-btn ${u.id===activeUser?'active':''}" data-switch-user="${u.id}">${u.label}</button>`).join('')}
    </div>

    <div class="masthead">
      <div>
        <h1 class="masthead-title">Painel Financeiro</h1>
        <p class="masthead-sub">livro-razão de ${USERS.find(u=>u.id===activeUser).label}</p>
      </div>
      <div class="month-nav">
        <button class="month-arrow" id="month-prev" aria-label="Mês anterior">‹</button>
        <span class="month-label">${monthLabel(data.month)}</span>
        <button class="month-arrow" id="month-next" aria-label="Próximo mês">›</button>
      </div>
    </div>

    <div class="hero">
      <div>
        <p class="hero-label">Saldo previsto do mês</p>
        <p class="hero-value ${saldo>=0?'pos':'neg'}">${fmt(saldo)}</p>
      </div>
      <div class="hero-stats">
        <div class="stat-block">
          <p class="stat-label">Entradas</p>
          <p class="stat-value income">${fmt(income)}</p>
        </div>
        <div class="stat-block">
          <p class="stat-label">Comprometido</p>
          <p class="stat-value expense">${fmt(committed)}</p>
        </div>
        <div class="stat-block">
          <p class="stat-label">Ainda a pagar</p>
          <p class="stat-value expense">${fmt(pending)}</p>
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <p class="card-title">Renda <span class="card-count">${data.incomes.length} fonte${data.incomes.length===1?'':'s'}</span></p>
        <hr class="rule">
        <ul class="row-list">
          ${data.incomes.length ? data.incomes.map(i=>`
            <li class="row-item">
              <span class="row-name">${escapeHtml(i.name)}</span>
              <span class="row-value income">${fmt(Number(i.value))}</span>
              <button class="row-del" data-del-income="${i.id}" aria-label="Remover">×</button>
            </li>`).join('') : '<li class="empty-msg">Nenhuma renda cadastrada ainda.</li>'}
        </ul>
        <div class="add-form">
          <input class="f-name" id="income-name" type="text" placeholder="Ex: Salário">
          <input class="f-value" id="income-value" type="number" step="0.01" placeholder="Valor">
          <button class="add-btn" id="add-income-btn">Adicionar</button>
        </div>
        <div class="subtotal-row"><span>Total</span><span>${fmt(income)}</span></div>
      </div>

      <div class="card">
        <p class="card-title">Gastos fixos <span class="card-count">${data.fixed.length}</span></p>
        <hr class="rule">
        <ul class="row-list">
          ${data.fixed.length ? data.fixed.map(f=>`
            <li class="row-item ${f.carryOver?'row-carry':''}">
              <div class="row-check ${f.paid?'checked':''}" data-toggle-fixed="${f.id}">
                <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
              <span class="row-name ${f.paid?'paid':''}">${escapeHtml(f.name)}${f.carryOver?'<span class="carry-tag">em aberto</span>':''}</span>
              ${f.day ? `<span class="row-day">dia ${f.day}</span>` : ''}
              ${f.carryOver
                ? `<input class="row-value-edit" type="number" step="0.01" data-edit-fixed="${f.id}" value="${Number(f.value)}">`
                : `<span class="row-value expense">${fmt(Number(f.value))}</span>`}
              <button class="row-del" data-del-fixed="${f.id}" aria-label="Remover">×</button>
            </li>`).join('') : '<li class="empty-msg">Nenhum gasto fixo cadastrado ainda.</li>'}
        </ul>
        <div class="add-form">
          <input class="f-name" id="fixed-name" type="text" placeholder="Ex: Aluguel">
          <input class="f-value" id="fixed-value" type="number" step="0.01" placeholder="Valor">
          <input class="f-day" id="fixed-day" type="number" min="1" max="31" placeholder="Dia">
          <button class="add-btn" id="add-fixed-btn">Adicionar</button>
        </div>
        <div class="subtotal-row"><span>Total</span><span>${fmt(fixed)}</span></div>
      </div>
    </div>

    <div class="debts-card">
      <p class="card-title">Dívidas e parcelamentos <span class="card-count">${activeDebts().length} ativa${activeDebts().length===1?'':'s'}</span></p>
      <hr class="rule">
      ${data.debts.length ? data.debts.map(d=>{
        const finished = d.paidInstallments >= d.totalInstallments;
        const pct = Math.min(100, Math.round((d.paidInstallments/d.totalInstallments)*100));
        return `
        <div class="debt-item">
          <div class="debt-main">
            <p class="debt-name ${d.paid||finished?'paid':''}">${escapeHtml(d.name)} ${finished?'<span class="stamp">QUITADA</span>':''}</p>
            <div class="debt-progress-wrap"><div class="debt-progress-bar" style="width:${pct}%"></div></div>
            <p class="debt-meta">${d.paidInstallments}/${d.totalInstallments} parcelas ${d.day ? '· vence dia '+d.day : ''}</p>
          </div>
          ${!finished ? `
          <div class="row-check ${d.paid?'checked':''}" data-toggle-debt="${d.id}" title="Marcar parcela deste mês como paga">
            <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <span class="row-value expense">${fmt(Number(d.installment))}</span>` : `<span class="row-value" style="color:var(--ink-soft)">—</span>`}
          <button class="row-del" data-del-debt="${d.id}" aria-label="Remover">×</button>
        </div>`;
      }).join('') : '<p class="empty-msg">Nenhuma dívida cadastrada ainda.</p>'}

      <div class="add-form" style="margin-top:16px;">
        <input class="f-name" id="debt-name" type="text" placeholder="Ex: Financiamento do carro">
        <input class="f-value" id="debt-value" type="number" step="0.01" placeholder="Valor da parcela">
        <input class="f-day" id="debt-total" type="number" min="1" placeholder="Nº parcelas" style="width:80px;">
        <input class="f-day" id="debt-paid" type="number" min="0" placeholder="Já pagas" style="width:80px;">
        <input class="f-day" id="debt-day" type="number" min="1" max="31" placeholder="Dia">
        <button class="add-btn" id="add-debt-btn">Adicionar</button>
      </div>
      <div class="subtotal-row"><span>Total em parcelas ativas</span><span>${fmt(debts)}</span></div>
    </div>

    <div class="close-month-box">
      <div class="close-month-text">
        <p><strong>O que este botão faz:</strong> pega tudo que você marcou com o check ✓ (gastos fixos e parcelas de dívidas) e considera pago neste mês.</p>
        <p>Ao fechar: as parcelas de dívida marcadas avançam +1 (ex: 3/12 vira 4/12), e todos os checks são desmarcados para o próximo mês começar do zero. A renda não muda. Se o saldo previsto ficar negativo, a diferença é lançada automaticamente como um gasto fixo "em aberto" para o próximo mês, com valor editável.</p>
        <p>Agora: <strong>${fixedPaidCount} de ${data.fixed.length}</strong> gastos fixos marcados, <strong>${debtPaidCount} de ${activeDebts().length}</strong> parcelas marcadas.</p>
      </div>
      <button class="close-month-btn" id="close-month-btn">Fechar mês</button>
    </div>

    <div class="footer-actions">
      <span class="saved-tag" id="saved-tag">salvo</span>
    </div>
  `;

  attachEvents();
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function attachEvents(){
  document.querySelectorAll('[data-switch-user]').forEach(el=>{
    el.addEventListener('click', ()=>switchUser(el.dataset.switchUser));
  });

  document.getElementById('month-prev').addEventListener('click', ()=>{
    currentData().month = shiftMonth(currentData().month, -1);
    saveData(); render();
  });
  document.getElementById('month-next').addEventListener('click', ()=>{
    currentData().month = shiftMonth(currentData().month, 1);
    saveData(); render();
  });

  document.getElementById('add-income-btn').addEventListener('click', ()=>{
    const name = document.getElementById('income-name').value.trim();
    const value = parseFloat(document.getElementById('income-value').value);
    if(!name || isNaN(value)) return;
    currentData().incomes.push({id:uid(), name, value});
    saveData(); render();
  });

  document.getElementById('add-fixed-btn').addEventListener('click', ()=>{
    const name = document.getElementById('fixed-name').value.trim();
    const value = parseFloat(document.getElementById('fixed-value').value);
    const day = parseInt(document.getElementById('fixed-day').value) || null;
    if(!name || isNaN(value)) return;
    currentData().fixed.push({id:uid(), name, value, day, paid:false});
    saveData(); render();
  });

  document.getElementById('add-debt-btn').addEventListener('click', ()=>{
    const name = document.getElementById('debt-name').value.trim();
    const installment = parseFloat(document.getElementById('debt-value').value);
    const totalInstallments = parseInt(document.getElementById('debt-total').value);
    const paidInstallments = parseInt(document.getElementById('debt-paid').value) || 0;
    const day = parseInt(document.getElementById('debt-day').value) || null;
    if(!name || isNaN(installment) || !totalInstallments) return;
    currentData().debts.push({id:uid(), name, installment, totalInstallments, paidInstallments, day, paid:false});
    saveData(); render();
  });

  document.querySelectorAll('[data-edit-fixed]').forEach(el=>{
    el.addEventListener('change', ()=>{
      const item = currentData().fixed.find(i=>i.id===el.dataset.editFixed);
      const v = parseFloat(el.value);
      if(item && !isNaN(v)) item.value = v;
      saveData(); render();
    });
  });

  document.querySelectorAll('[data-del-income]').forEach(el=>{
    el.addEventListener('click', ()=>{
      currentData().incomes = currentData().incomes.filter(i=>i.id!==el.dataset.delIncome);
      saveData(); render();
    });
  });
  document.querySelectorAll('[data-del-fixed]').forEach(el=>{
    el.addEventListener('click', ()=>{
      currentData().fixed = currentData().fixed.filter(i=>i.id!==el.dataset.delFixed);
      saveData(); render();
    });
  });
  document.querySelectorAll('[data-del-debt]').forEach(el=>{
    el.addEventListener('click', ()=>{
      currentData().debts = currentData().debts.filter(i=>i.id!==el.dataset.delDebt);
      saveData(); render();
    });
  });
  document.querySelectorAll('[data-toggle-fixed]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const item = currentData().fixed.find(i=>i.id===el.dataset.toggleFixed);
      if(item) item.paid = !item.paid;
      saveData(); render();
    });
  });
  document.querySelectorAll('[data-toggle-debt]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const item = currentData().debts.find(i=>i.id===el.dataset.toggleDebt);
      if(item) item.paid = !item.paid;
      saveData(); render();
    });
  });

  document.getElementById('close-month-btn').addEventListener('click', ()=>{
    const data = currentData();
    const fixedClosed = data.fixed.filter(f=>f.paid && !f.carryOver).length;
    const debtsAdvanced = data.debts.filter(d=>d.paid && d.paidInstallments < d.totalInstallments).length;

    const fixedExclCarry = data.fixed.filter(f=>!f.carryOver).reduce((s,i)=>s+Number(i.value||0),0);
    const freshShortfall = totalIncome() - fixedExclCarry - totalDebts();

    let carry = data.fixed.find(f=>f.carryOver);
    if(carry && carry.paid){
      data.fixed = data.fixed.filter(f=>f!==carry);
      carry = null;
    }

    data.fixed.forEach(f=>{ if(!f.carryOver) f.paid = false; });
    data.debts.forEach(d=>{
      if(d.paid && d.paidInstallments < d.totalInstallments){
        d.paidInstallments = d.paidInstallments + 1;
      }
      d.paid = false;
    });

    let carryMsg = '';
    if(freshShortfall < 0){
      const amount = Math.abs(freshShortfall);
      if(carry){
        carry.value = Number(carry.value||0) + amount;
      }else{
        data.fixed.unshift({id:uid(), name:'Saldo em aberto (mês anterior)', value:amount, day:null, paid:false, carryOver:true});
      }
      carryMsg = ` Saldo negativo de ${fmt(amount)} enviado como valor em aberto para o próximo mês.`;
    }

    saveData(); render();
    showToast(`Mês fechado: ${fixedClosed} gasto${fixedClosed===1?'':'s'} fixo${fixedClosed===1?'':'s'} quitado${fixedClosed===1?'':'s'} e ${debtsAdvanced} parcela${debtsAdvanced===1?'':'s'} avançada${debtsAdvanced===1?'':'s'}.${carryMsg}`);
  });
}

async function init(){
  await loadActiveUser();
  await loadUserData(activeUser);
  render();
}

init();
</script>
</body>
</html>
